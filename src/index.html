<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Joel Alvarez" />
    <meta
      name="description"
      content="Spots is a responsive photo-sharing app where users manage a profile and share image posts with likes, CRUD actions, and accessible modals — built with HTML, CSS, and JavaScript."
    />
    <meta property="og:title" content="Spots — Photo sharing app" />
    <meta
      property="og:description"
      content="Manage your profile and share image spots. Vanilla JS app with REST API integration and a responsive, accessible UI."
    />
    <meta
      property="og:url"
      content="https://alvarez-j1.github.io/se_project_spots/"
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Spots — Photo sharing app" />
    <meta
      name="twitter:description"
      content="Manage your profile and share image spots. Vanilla JS app with REST API integration and a responsive, accessible UI."
    />
    <meta name="theme-color" content="#fcf5e5" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <title>Spots — Photo sharing app</title>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div class="page">
      <header class="header">
        <img id="logo__image" alt="Spot logo" class="header__logo" />
      </header>
      <main id="main-content" class="content" tabindex="-1">
        <section class="profile page__section" aria-busy="true">
          <div class="profile__avatar-container">
            <button class="profile__avatar-btn" type="button" aria-label="Edit profile avatar">
              <img
                class="profile__pencil-icon"
                src="<%= require('./images/pencil-icon.svg') %>"
                alt=""
              />
            </button>
            <img alt="" class="profile__avatar" />
          </div>
          <div class="profile__column">
            <h1 class="profile__name"></h1>
            <p class="profile__description"></p>
            <p
              class="profile__load-error"
              id="profile-load-error"
              role="alert"
              hidden
            >
              Could not load your profile. Please refresh and try again.
            </p>
            <button type="button" class="profile__edit-btn">
              <img
                id="pencil__image"
                alt=""
                class="profile__pencil-icn"
              />Edit Profile
            </button>
          </div>
          <button type="button" class="profile__add-btn">
            <img id="plus__image" alt="" class="profile__plus-icn" />New
            Post
          </button>
        </section>
        <section class="cards page__section" aria-busy="true">
          <p class="cards__empty" id="cards-empty" hidden aria-live="polite">
            No spots yet. Click "New Post" to share your first image.
          </p>
          <p
            class="cards__status"
            id="cards-status"
            role="alert"
            hidden
            aria-live="assertive"
          ></p>
          <ul class="cards__list">
            <template id="card-template">
              <li class="card">
                <button type="button" class="card__image-btn">
                  <img
                    src=""
                    alt="card"
                    class="card__image"
                    loading="lazy"
                    decoding="async"
                  />
                </button>
                <div class="card__content">
                  <h2 class="card__title"></h2>
                  <button
                    type="button"
                    class="card__like-btn"
                    aria-label="Like"
                    aria-pressed="false"
                  ></button>
                  <button
                    type="button"
                    class="card__remove-btn"
                    aria-label="Delete card"
                  ></button>
                </div>
              </li>
            </template>
          </ul>
        </section>
      </main>
      <footer class="footer">
        <p class="footer__copyright">
          <span class="footer__year">2026</span> © Spots
        </p>
      </footer>
      <div class="modal" id="edit-profile-modal">
        <div
          class="modal__content"
          role="dialog"
          aria-modal="true"
          aria-labelledby="edit-profile-title"
        >
          <button
            type="button"
            class="modal__close-btn"
            aria-label="Close modal"
          ></button>
          <h2 class="modal__title" id="edit-profile-title">Edit profile</h2>
          <form name="profile-form" class="modal__form" novalidate>
            <label for="profile-name-input" class="modal__label">
              Name
              <input
                id="profile-name-input"
                type="text"
                class="modal__input"
                placeholder="Type your name"
                required
                minlength="2"
                maxlength="40"
              />
              <span id="profile-name-input-error" class="modal__error"></span>
            </label>
            <label for="profile-description-input" class="modal__label">
              Description
              <input
                id="profile-description-input"
                type="text"
                class="modal__input"
                placeholder="Describe yourself"
                required
                minlength="2"
                maxlength="200"
              />
              <span
                id="profile-description-input-error"
                class="modal__error"
              ></span>
            </label>
            <button type="submit" class="modal__submit-btn">Save</button>
          </form>
        </div>
      </div>

      <div class="modal" id="add-card-modal">
        <div
          class="modal__content"
          role="dialog"
          aria-modal="true"
          aria-labelledby="add-card-title"
        >
          <button
            type="button"
            id="add-profile-close-btn"
            class="modal__close-btn"
            aria-label="Close modal"
          ></button>
          <h2 class="modal__title" id="add-card-title">New post</h2>
          <form name="card-form" class="modal__form" novalidate>
            <label for="add-card-link-input" class="modal__label">
              Image link
              <input
                id="add-card-link-input"
                type="url"
                class="modal__input"
                name="link"
                placeholder="Paste a link to the picture"
                required
              />
              <span id="add-card-link-input-error" class="modal__error"></span>
            </label>
            <label for="add-card-name-input" class="modal__label">
              Caption
              <input
                id="add-card-name-input"
                type="text"
                class="modal__input"
                name="name"
                placeholder="Type your caption"
                required
                minlength="2"
                maxlength="100"
              />
              <span id="add-card-name-input-error" class="modal__error"></span>
            </label>
            <button type="submit" class="modal__submit-btn">Save</button>
          </form>
        </div>
      </div>
      <div class="modal" id="preview-modal">
        <div
          class="modal__content-preview"
          role="dialog"
          aria-modal="true"
          aria-label="Image preview"
        >
          <button
            aria-label="Close modal"
            class="modal__close-btn modal__close-btn-preview"
            type="button"
          ></button>
          <img class="modal__image" src="" alt="" />
          <p class="modal__caption"></p>
        </div>
      </div>
    </div>

    <div class="modal" id="delete-modal">
      <div
        class="modal__content"
        id="delete-content"
        role="dialog"
        aria-modal="true"
        aria-labelledby="delete-title"
      >
        <button
          type="button"
          class="modal__close-btn"
          id="close-btn"
          aria-label="Close modal"
        ></button>
        <h2 class="modal__title" id="delete-title">
          Are you sure you want to delete this image?
        </h2>
        <form
          name="remove-form"
          class="modal__form"
          id="delete-form"
          novalidate
        >
          <button type="submit" class="modal__submit-btn" id="delete-btn">
            Delete
          </button>
          <button type="button" class="modal__submit-btn" id="cancel-btn">
            Cancel
          </button>
        </form>
      </div>
    </div>
    <div class="modal" id="avatar-modal">
      <div
        class="modal__content"
        role="dialog"
        aria-modal="true"
        aria-labelledby="edit-avatar-title"
      >
        <button
          type="button"
          class="modal__close-btn"
          id="avatar__close-btn"
          aria-label="Close modal"
        ></button>
        <h2 class="modal__title" id="edit-avatar-title">Edit profile avatar</h2>
        <form
          name="avatar-form"
          class="modal__form"
          id="edit-avatar-form"
          novalidate
        >
          <label
            for="profile-avatar-input"
            class="modal__label modal__label_type_avatar"
          >
            Profile Picture
            <input
              id="profile-avatar-input"
              class="modal__input modal__input_type_avatar"
              name="avatar"
              placeholder="Paste the link to an image"
              required
              type="url"
            />
            <span id="profile-avatar-input-error" class="modal__error"></span>
          </label>
          <button
            type="submit"
            class="modal__submit-btn"
            id="avatar__submit-btn"
          >
            Save
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
